<script>
  function verificartipo() {
    // aguardar();

    var nome_cpf = nome_cpf_input.value;
    var quantLogin = Number(nome_cpf.length);
    var verificaTipo = 0; //poderia ser usado true ou false

    for (let i = 0; i < quantLogin; i++) {
      if (nome_cpf[i] == "@") {
        verificaTipo += 1;
      }
    }

    if (verificaTipo == 1) {
      entrarEmail();
    } else if (verificaTipo > 1) {
      alert("Email deve ter apenas um '@'");
      return false;
    } else {
      entrarCPF();
    }
  }
  function entrarCPF() {
    var cpfVar = nome_cpf_input.value;
    var senhaVar = senha_input.value;

    console.log("FORM LOGIN: ", cpfVar);
    console.log("FORM SENHA: ", senhaVar);

    fetch("/usuarios/autenticarcpf", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        cpfServer: cpfVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("ESTOU NO THEN DO entrar()!");

        if (resposta.ok) {
          console.log(resposta);

          resposta.json().then((json) => {
            console.log(json);
            console.log(JSON.stringify(json));
            sessionStorage.EMAIL_USUARIO = json.cpf;
            sessionStorage.NOME_USUARIO = json.nome;
            sessionStorage.ID_USUARIO = json.id_usuario;
            sessionStorage.FK_ADM = json.fk_adm;
            sessionStorage.FK_EMPRESA = json.fk_empresa;
            sessionStorage.FK_FUNCAO = json.fk_funcao;

            setTimeout(function () {
              window.location = "/dashboard/dashboard.html";
            }, 1000); // apenas para exibir o loading
          });
        } else {
          console.log("Houve um erro ao tentar realizar o login!");

          resposta.text().then((texto) => {
            console.error(texto);
            finalizarAguardar(texto);
          });
        }
      })
      .catch(function (erro) {
        console.log(erro);
      });

    return false;
  }
  function entrarEmail() {
    var emailVar = nome_cpf_input.value;
    var senhaVar = senha_input.value;

    if (emailVar.trim() == "" || senhaVar.trim() == "") {
      alert("Os campos não devem estar em branco");
      return false;
    }

    console.log("FORM LOGIN: ", emailVar);
    console.log("FORM SENHA: ", senhaVar);

    fetch("/usuarios/autenticaremail", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("ESTOU NO THEN DO entrar()!");

        if (resposta.ok) {
          console.log(resposta);

          resposta.json().then((json) => {
            console.log(json);
            console.log(JSON.stringify(json));
            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.NOME_USUARIO = json.nome;
            sessionStorage.ID_USUARIO = json.id_usuario;
            sessionStorage.FK_ADM = json.fk_adm;
            sessionStorage.FK_EMPRESA = json.fk_empresa;
            sessionStorage.FK_FUNCAO = json.fk_funcao;


            setTimeout(function () {
              window.location = "/dashboard/dashboard.html";
            }, 1000); // apenas para exibir o loading
          });
        } else {
          console.log("Houve um erro ao tentar realizar o login!");

          resposta.text().then((texto) => {
            console.error(texto);
          });
        }
      })
      .catch(function (erro) {
        console.log(erro);
      });

    return false;
  }
</script>
