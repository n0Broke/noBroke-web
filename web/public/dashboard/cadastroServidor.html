<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/cadastro.css" />

    <link rel="icon" href="./assets/imgs-logo-nobroke/noBroke-menor-sem-fundo.png">
    <title>Cadastro Servidor | noBroke</title>
</head>

<body>
    <nav class="navbar navbar-dark navbar-expand-md p-0 w-100 h-">
        <div class="container-fluid" id="header">
            <a href="index.html#inicio" class="navbar-brand ps-md-5 my-3">
                <img class="logo-dash img-fluid"
                            src="../assets/imgs-logo-nobroke/noBroke-oficial-sem-fundo.png">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-nav"
                aria-controls="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end align-center" id="main-nav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link link-light" href="#inicio">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link link-light" href="#sobre-nos">Sobre</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link link-light" href="#fale-conosco">Contato</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link link-light" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="background d-flex align-items-center justify-content-center flex-column meio" id="telaEmpresa">
        <div class="container text-center">
            <div class="campos">
                <div class="col borda">
                    <div class="mb-3">
                        <label class="label-title d-flex justify-content-start" for="formGroupExampleInput"
                            class="form-label">
                            <h5>Cadastro de Servidor</h5>
                    </div>
                    <div class="mb-3">
                        <label class="label-title d-flex justify-content-start" for="formGroupExampleInput"
                            class="form-label">
                            <div class="passos">
                                <div class="bolinha ativa"></div>
                                <div class="linha"></div>
                                <div class="bolinha"></div>
                                <p class="texto-passo">Passo 1 de 2</p>
                            </div>
                    </div>
                    <div class="mb-3">
                        <label class="label-title d-flex justify-content-start" for="formGroupExampleInput"
                            class="form-label">
                            <h6>Nome do Servidor*</h6>
                        </label>
                        <input type="text" maxlength="80" class="form-control" id="nomeServidor_input"
                            placeholder="Ex.: serv-banco-01" />
                    </div>
                    <div class="mb-3">
                        <label class="label-title d-flex justify-content-start" for="formGroupExampleInput"
                            class="form-label">
                            <h6>Sistema_operacional*</h6>
                        </label>
                        <input type="text" class="form-control" id="SistemaOperacional_input"
                            placeholder="Ex.: Ubuntu" />
                    </div>
                    <div class="mb-3">
                        <label class="label-title d-flex justify-content-start" for="formGroupExampleInput2"
                            class="form-label">
                            <h6>Numero serial*</h6>
                        </label>
                        <div class="input-group mb-3">
                            <input type="text" maxlength="60" class="form-control" id="NumeroSerial_input"
                                placeholder="Ex.: CZJ1234XYZ" aria-label="Recipient’s username"
                                aria-describedby="basic-addon2" />
                        </div>
                    </div>
                    <div class="d-grid justify-content-center mx-auto">
                        <button class="btn btn-light button-color botao" type="button" onclick="cadastrarEmpresa()">
                            CADASTRAR
                        </button>
                    </div>
                </div>
                <div class="col">
                    <a href="index.html"> </a>
                </div>
            </div>
        </div>
    </div>

    <div class="background d-flex align-items-center justify-content-center flex-column meio" id="telaAdm">
        <div class="container text-center">
            <div class="campos">
                <div class="col borda">
                    <div class="mb-3">
                        <label class="label-title d-flex justify-content-start" for="formGroupExampleInput"
                            class="form-label">
                            <h5>Cadastre seus componentes</h5>
                    </div>
                    <div class="mb-3">
                        <label class="label-title d-flex justify-content-start" for="formGroupExampleInput"
                            class="form-label">
                            <div class="passos">
                                <div class="bolinha"></div>
                                <div class="linha"></div>
                                <div class="bolinha ativa"></div>
                                <p class="texto-passo">Passo 2 de 2</p>
                            </div>
                    </div>
                    <div class="mb-3">

                        <div class="grupo-check">
                            <h4>CPU (Processador)</h4>

                            <label class="item-check">
                                <span>Utilização</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Tempos da CPU</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Contagem de núcleos</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Frequência</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Carga média do sistema</span>
                                <input type="checkbox">
                            </label>
                        </div>

                        <div class="grupo-check">
                            <h4>Memória</h4>

                            <label class="item-check">
                                <span>Memória total RAM</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Memória disponível RAM</span>
                                <input type="checkbox">
                            </label>

                             <label class="item-check">
                                <span>Memória em uso RAM</span>
                                <input type="checkbox">
                            </label>

                             <label class="item-check">
                                <span>Memória livre RAM</span>
                                <input type="checkbox">
                            </label>

                             <label class="item-check">
                                <span>Uso da memória (%)</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Uso do swap (%)</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Swap em uso</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Swap livre</span>
                                <input type="checkbox">
                            </label>
                        </div>

                        <div class="grupo-check">
                            <h4>Discos (Armazenamento)</h4>

                            <label class="item-check">
                                <span>Partições</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Uso de disco</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Estatísticas de E/S (I/O)</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Latência de disco</span>
                                <input type="checkbox">
                            </label>
                        </div>

                        <div class="grupo-check">
                            <h4>Rede</h4>

                            <label class="item-check">
                                <span>Volume de dados enviados/recebidos</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Erros e descartes de pacotes</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Latência de rede</span>
                                <input type="checkbox">
                            </label>
                        </div>

                        <div class="grupo-check">
                            <h4>Processos</h4>

                            <label class="item-check">
                                <span>Tempo de CPU do processo</span>
                                <input type="checkbox">
                            </label>

                            <label class="item-check">
                                <span>Tempo de espera por I/O (iowait)</span>
                                <input type="checkbox">
                            </label>
                        </div>
                        <div class="d-grid justify-content-center mx-auto">
                        <button class="btn btn-light button-color botao" type="button" onclick="cadastrarEmpresa()">
                            CADASTRAR
                        </button>
                    </div>
                    </div>
                    <div class="col">
                        <a href="index.html"> </a>
                    </div>
                </div>
            </div>
        </div>
        </div>

        <section id="footer">
            <div class="container py-3">
                <div class="row">
                    <div class="col-md-6 d-flex flex-column align-items-center align-items-md-start">
                        <a href="#inicio" class="navbar-brand text-center text-md-start m-0">
                            <img src="../assets/imgs-logo-nobroke/noBroke-oficial-sem-fundo.png" width="90%"
                                height="60px" alt="" />
                        </a>
                        <span class="text-center">Transformando dados em decisões inteligentes</span>
                    </div>
                    <div class="col-md-3 d-flex flex-column">
                        <span class="text-light text-center text-md-start fw-bold">CONTATOS</span>
                        <span class="text-center text-md-start">comercial@nobroke.com</span>
                        <span class="text-center text-md-start">Rua Haddock Lobo, 595</span>
                        <span class="text-center text-md-start">+55 (11)90000-0000</span>
                    </div>
                    <div class="col-md-3 d-flex flex-column">
                        <span class="text-light text-center text-md-start fw-bold">REDES SOCIAIS</span>
                        <div class="mt-3 d-flex justify-content-center justify-content-md-start">
                            <img src="../assets/icon/icon-linkedin.png" class="img-redes me-2" alt="" />
                            <img src="../assets/icon/icon-instagram.png" class="img-redes me-2" alt="" />
                            <img src="../assets/icon/icon-facebook.png" class="img-redes me-2" alt="" />
                        </div>
                    </div>
                </div>
            </div>
        </section>
</body>
<script>
  function cadastrarEmpresa() {
    document.getElementById("telaEmpresa").classList.add("d-none");

    const telaAdm = document.getElementById("telaAdm");
    telaAdm.classList.remove("d-none");
    telaAdm.classList.add("d-flex");
  }
</script>
</html>
